services:
  cron-scheduler:
    build: .
    container_name: wp-cron-scheduler
    networks:
      - cronnet
    volumes:
      - /opt/wp-cron-scheduler/sites.json:/config/sites.json:ro   # leesbaar mounten
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 150s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  cronnet:
    name: cronnet
    driver: bridge
    enable_ipv6: true